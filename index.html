<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leuk Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap">
<link rel="stylesheet" href="styles.css?v=123">
<link rel="stylesheet" href="fichas.css?v=123">
</head>
<body class="locked">

<!-- PANTALLA DE INGRESO (cubre toda la app hasta iniciar sesión) -->
<div id="gate" class="gate">
  <div class="gate-card">
    <img src="assets/logo-leuk-ilum.png?v=123" alt="Leuk Iluminación" class="gate-logo">
    <h1>Leuk Marketing</h1>
    <p class="gate-sub">Ingresá con tu usuario para acceder.</p>
    <input id="gateEmail" type="email" placeholder="Email" autocomplete="username" class="lg-in">
    <input id="gatePass" type="password" placeholder="Contraseña" autocomplete="current-password" class="lg-in">
    <div id="gateErr" class="lg-err"></div>
    <button id="gateGo" class="btn-primary gate-btn">Ingresar</button>
    <button id="gateForgot" class="lg-link">¿Olvidaste tu contraseña?</button>
  </div>
</div>

<div class="topwrap">
<header class="topbar">
  <div class="brand">
    <img src="assets/isologo-uk.png?v=123" alt="Ukelele" class="logo">
    <span class="brand-sub">Leuk Marketing</span>
  </div>
  <div class="top-right">
    <!-- nivel 1: MÓDULOS de la plataforma -->
    <nav class="mode-toggle" id="nav">
      <button data-mod="inicio" class="active">Inicio</button>
      <button data-mod="benchmark">Benchmark</button>
      <button data-mod="diseno">Diseño</button>
      <button data-mod="usuarios">Usuarios</button>
    </nav>
    <button id="btnAuth" class="btn-desc" title="Cerrar sesión">👤</button>
  </div>
</header>
<!-- nivel 2: páginas del módulo activo + sus herramientas (se arma en app.js) -->
<div id="subbar" class="subbar hidden">
  <span class="sb-lbl" id="sbLabel"></span>
  <div class="sb-pages" id="sbPages"></div>
  <!-- herramientas DEL MÓDULO: sólo aplican a Benchmark, por eso viven acá y no en el header -->
  <div class="sb-tools" id="sbTools">
    <button id="btnPrecios" class="btn-desc" title="Actualizar precios desde una lista (Excel)">⬆ Precios</button>
    <button id="btnDesc" class="btn-desc" title="Editar descuentos / precio neto">⚙ Descuentos</button>
  </div>
</div>
</div>

<main>
  <!-- PÁGINA INICIO (home) -->
  <section id="page-inicio" class="page"><div id="inicio"></div></section>

  <!-- PÁGINA COMPARACIONES -->
  <section id="page-comparaciones" class="page hidden">
    <div class="search-wrap">
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="Buscá un producto Leuk por SKU, nombre o familia…">
    </div>
    <div id="catFilters" class="cat-filters"></div>
    <div id="catCount" class="cat-count"></div>
    <div id="catalogo" class="cat-grid"></div>
    <div id="comparacion"></div>
  </section>

  <!-- PÁGINA RESULTADOS (solo comparaciones autorizadas) -->
  <section id="page-resultados" class="page hidden">
    <div class="res-intro">Comparaciones <b>seleccionadas</b> — comparación por <b>precio neto</b> (con el descuento de cada marca). Seleccioná desde <b>Catálogo</b>.</div>
    <div class="filters" id="filters"></div>
    <div class="filters-bar">
      <span id="countLabel" class="count"></span>
      <div class="btn-row">
        <button id="importBtn" class="btn-ghost">⬆ Importar</button>
        <button id="exportJsonBtn" class="btn-ghost">⬇ Selecciones (.json)</button>
        <button id="exportBtn" class="btn-ghost">⬇ Exportar CSV</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </div>
    <div id="tabla"></div>
  </section>

  <!-- PÁGINA DECISIONES (tablero sobre lo autorizado) -->
  <section id="page-decisiones" class="page hidden">
    <div class="res-intro">Insights sobre tus comparaciones <b>seleccionadas</b>. Cuantas más selecciones, más completo.</div>
    <div id="dash"></div>
  </section>

  <!-- PÁGINA FICHAS TÉCNICAS -->
  <section id="page-fichas" class="page hidden"></section>

  <!-- PÁGINA USUARIOS (sólo admin) -->
  <section id="page-usuarios" class="page hidden"><div id="usuarios"></div></section>
</main>

<div id="detail" class="detail hidden"><div class="detail-inner" id="detailInner"></div></div>
<footer class="foot"><span id="metaLine"></span></footer>

<script src="vendor/xlsx.full.min.js?v=123"></script>
<!-- generación del ZIP con todas las fichas, desde el navegador -->
<script src="vendor/html2canvas.min.js?v=123"></script>
<script src="vendor/jspdf.umd.min.js?v=123"></script>
<script src="vendor/jszip.min.js?v=123"></script>
<script src="app.js?v=123"></script>
<script src="fichas-data.js?v=123"></script>
<script src="fichas-ui.js?v=123"></script>
</body>
</html>
