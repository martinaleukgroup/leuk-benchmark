<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchmark Leuk · Comparaciones</title>
<link rel="stylesheet" href="styles.css?v=49">
</head>
<body class="locked">

<!-- PANTALLA DE INGRESO (cubre toda la app hasta iniciar sesión) -->
<div id="gate" class="gate">
  <div class="gate-card">
    <img src="assets/logo-leuk-ilum.png?v=49" alt="Leuk Iluminación" class="gate-logo">
    <h1>Benchmark competitivo</h1>
    <p class="gate-sub">Ingresá con tu usuario para acceder.</p>
    <input id="gateEmail" type="email" placeholder="Email" autocomplete="username" class="lg-in">
    <input id="gatePass" type="password" placeholder="Contraseña" autocomplete="current-password" class="lg-in">
    <div id="gateErr" class="lg-err"></div>
    <button id="gateGo" class="btn-primary gate-btn">Ingresar</button>
  </div>
</div>

<header class="topbar">
  <div class="brand">
    <img src="assets/isologo-uk.png?v=49" alt="Ukelele" class="logo">
    <span class="brand-sub">Benchmark competitivo</span>
  </div>
  <div class="top-right">
    <nav class="mode-toggle" id="nav">
      <button data-page="inicio" class="active">Inicio</button>
      <button data-page="comparaciones">Comparaciones</button>
      <button data-page="resultados">Resultados <span id="navCount" class="nav-count"></span></button>
      <button data-page="decisiones">Decisiones</button>
    </nav>
    <button id="btnPrecios" class="btn-desc" title="Actualizar precios desde una lista (Excel)">⬆ Precios</button>
    <button id="btnDesc" class="btn-desc" title="Editar descuentos / precio neto">⚙ Descuentos</button>
    <button id="btnAuth" class="btn-desc" title="Cerrar sesión">👤</button>
  </div>
</header>

<main>
  <!-- PÁGINA INICIO (home) -->
  <section id="page-inicio" class="page"><div id="inicio"></div></section>

  <!-- PÁGINA COMPARACIONES -->
  <section id="page-comparaciones" class="page hidden">
    <div class="search-wrap">
      <input id="search" type="search" inputmode="search" autocomplete="off"
             placeholder="Buscá un producto Leuk por SKU o nombre (ej: 7052, Freya)…">
    </div>
    <div id="catFilters" class="cat-filters"></div>
    <div id="catCount" class="cat-count"></div>
    <div id="catalogo" class="cat-grid"></div>
    <div id="comparacion"></div>
  </section>

  <!-- PÁGINA RESULTADOS (solo comparaciones autorizadas) -->
  <section id="page-resultados" class="page hidden">
    <div class="res-intro">Comparaciones <b>autorizadas</b> — comparación por <b>precio neto</b> (con el descuento de cada marca). Autorizá desde <b>Comparaciones</b>.</div>
    <div class="filters" id="filters"></div>
    <div class="filters-bar">
      <span id="countLabel" class="count"></span>
      <div class="btn-row">
        <button id="importBtn" class="btn-ghost">⬆ Importar</button>
        <button id="exportJsonBtn" class="btn-ghost">⬇ Autorizaciones (.json)</button>
        <button id="exportBtn" class="btn-ghost">⬇ Exportar CSV</button>
        <input id="importFile" type="file" accept="application/json" hidden>
      </div>
    </div>
    <div id="tabla"></div>
  </section>

  <!-- PÁGINA DECISIONES (tablero sobre lo autorizado) -->
  <section id="page-decisiones" class="page hidden">
    <div class="res-intro">Tablero de decisión sobre tus comparaciones <b>autorizadas</b>. Cuanto más autorices, más completo.</div>
    <div id="dash"></div>
  </section>
</main>

<div id="detail" class="detail hidden"><div class="detail-inner" id="detailInner"></div></div>
<footer class="foot"><span id="metaLine"></span></footer>

<script src="vendor/xlsx.full.min.js?v=49"></script>
<script src="app.js?v=49"></script>
</body>
</html>
